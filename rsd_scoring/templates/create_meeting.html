{% extends "base.html" %}

{% block title %}Tạo Buổi họp mới{% endblock %}

{% block content %}
<h1>Tạo Buổi họp mới</h1>

<form method="POST" class="form">
    <div class="form-group">
        <label for="title">Tiêu đề:</label>
        <input type="text" id="title" name="title" required>
    </div>
    <div class="form-group">
        <label for="date">Ngày giờ:</label>
        <input type="datetime-local" id="date" name="date" required>
    </div>
    <div class="form-group">
        <label for="location">Địa điểm:</label>
        <input type="text" id="location" name="location">
    </div>
    <div class="form-group">
        <label for="notes">Ghi chú:</label>
        <textarea id="notes" name="notes" rows="4"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Tạo Buổi họp</button>
    <a href="{{ url_for('admin_meetings') }}" class="btn btn-secondary">Hủy</a>
</form>
{% endblock %}
