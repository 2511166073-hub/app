{% extends "base.html" %}

{% block title %}Tạo buổi họp - RSD Scoring{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📅 Tạo buổi họp mới</h1>
</div>

<form method="POST" class="form-card">
    <div class="form-group">
        <label for="title">Tiêu đề buổi họp</label>
        <input type="text" id="title" name="title" required placeholder="Ví dụ: Họp Ban tháng 10">
    </div>
    
    <div class="form-group">
        <label for="meeting_type">Loại buổi họp</label>
        <select id="meeting_type" name="meeting_type" required>
            <option value="ban">Họp Ban</option>
            <option value="clb">Họp CLB</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="date">Ngày giờ</label>
        <input type="datetime-local" id="date" name="date" required>
    </div>
    
    <div class="form-group">
        <label for="agenda_assigned_to">Người làm nội dung họp</label>
        <select id="agenda_assigned_to" name="agenda_assigned_to">
            <option value="">-- Chọn thành viên --</option>
            {% for user in users %}
            <option value="{{ user.id }}">{{ user.full_name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label for="minutes_assigned_to">Người làm biên bản</label>
        <select id="minutes_assigned_to" name="minutes_assigned_to">
            <option value="">-- Chọn thành viên --</option>
            {% for user in users %}
            <option value="{{ user.id }}">{{ user.full_name }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Tạo buổi họp</button>
        <a href="{{ url_for('admin_meetings') }}" class="btn btn-secondary">Quay lại</a>
    </div>
</form>
{% endblock %}
