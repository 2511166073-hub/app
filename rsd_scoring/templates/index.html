{% extends "base.html" %}

{% block title %}Bảng xếp hạng{% endblock %}

{% block content %}
<h1>Bảng xếp hạng</h1>

<table class="table">
    <thead>
        <tr>
            <th>Hạng</th>
            <th>Tên đăng nhập</th>
            <th>Nhóm</th>
            <th>Điểm số</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.group.name if user.group else '-' }}</td>
            <td>{{ user.score }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
